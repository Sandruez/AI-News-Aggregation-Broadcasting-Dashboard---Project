# Production Frontend Railway Configuration
[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile.prod"
dockerContext = "frontend/"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
VITE_API_URL = "${{services.BACKEND.url}}/api"
VITE_APP_NAME = "AI News Dashboard"
VITE_APP_VERSION = "2.0.0"

[[services]]
name = "frontend"
[services.ports]
port = 80
[services.healthChecks]
path = "/"
interval = "15s"
timeout = "10s"
retries = 3

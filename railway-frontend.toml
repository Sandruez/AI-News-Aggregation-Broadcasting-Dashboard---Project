# Frontend Railway Configuration - Root Level
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
VITE_API_URL = "${{RAILWAY_ENVIRONMENT.BACKEND_URL}}"

[[services]]
name = "frontend"
[services.ports]
port = 80
[services.healthChecks]
path = "/"
interval = "15s"
timeout = "10s"
retries = 3

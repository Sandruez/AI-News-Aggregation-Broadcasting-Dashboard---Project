# Railway Configuration - Backend Service Only
# https://docs.railway.app/guides/deploying-with-config-files

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
ENVIRONMENT = "production"
DATABASE_URL = "${{RAILWAY_ENVIRONMENT.DATABASE_URL}}"
GROQ_API_KEY = "${{RAILWAY_ENVIRONMENT.GROQ_API_KEY}}"

[[services]]
name = "backend"
[services.ports]
port = 8000
[services.healthChecks]
path = "/health"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"

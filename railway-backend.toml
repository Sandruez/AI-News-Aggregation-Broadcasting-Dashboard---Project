# Minimal Backend Railway Configuration
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python backend/minimal_main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PORT = "8000"

[[services]]
name = "backend"
[services.ports]
port = 8000
[services.healthChecks]
path = "/health"
interval = "15s"
timeout = "10s"
retries = 3

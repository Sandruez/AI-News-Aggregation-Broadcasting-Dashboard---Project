# Railway Configuration for Monorepo
# https://docs.railway.app/guides/deploying-with-config-files

[build]
builder = "DOCKERFILE"
rootDirectory = "."

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Global environment variables
[env]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
ENVIRONMENT = "production"

# Frontend Service
[[services]]
name = "frontend"
source = "frontend/"
build = { dockerfilePath = "frontend/Dockerfile.prod" }
[services.ports]
port = 80
[services.healthChecks]
path = "/"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"
[services.env]
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"

# Backend Service  
[[services]]
name = "backend"
source = "backend/"
build = { dockerfilePath = "backend/Dockerfile" }
[services.ports]
port = 8000
[services.healthChecks]
path = "/health"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"
[services.env]
DATABASE_URL = "${{RAILWAY_ENVIRONMENT.DATABASE_URL}}"
GROQ_API_KEY = "${{RAILWAY_ENVIRONMENT.GROQ_API_KEY}}"
ENVIRONMENT = "production"

# Railway Configuration - Frontend Service Only
# https://docs.railway.app/guides/deploying-with-config-files

[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile.prod"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"

[[services]]
name = "frontend"
[services.ports]
port = 80
[services.healthChecks]
path = "/"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"

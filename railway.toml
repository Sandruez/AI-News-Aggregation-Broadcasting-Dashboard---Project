# Railway Configuration for Monorepo
# https://docs.railway.app/guides/deploying-with-config-files

[build]
builder = "DOCKERFILE"
# Root directory for monorepo
rootDirectory = "."

[deploy]
# Using docker-compose for multi-service deployment
startCommand = "docker-compose -f docker-compose.railway.yml up -d --build"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Global environment variables
[env]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
ENVIRONMENT = "production"

# Frontend Service
[[services]]
name = "frontend"
root = "frontend"
build = { dockerfilePath = "frontend/Dockerfile.prod" }
[services.ports]
port = 80
[services.healthChecks]
path = "/"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"

# Backend Service  
[[services]]
name = "backend"
root = "backend"
build = { dockerfilePath = "backend/Dockerfile" }
[services.ports]
port = 8000
[services.healthChecks]
path = "/health"
interval = "15s"
timeout = "10s"
retries = 3
gracePeriod = "30s"

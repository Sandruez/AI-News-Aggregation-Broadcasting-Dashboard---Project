# Railway Configuration
# https://docs.railway.app/guides/deploying-with-config-files

[build]
builder = "NIXPACKS"

[deploy]
# Using docker-compose for multi-service deployment
startCommand = "docker-compose -f docker-compose.railway.yml up"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Global environment variables
[env]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
ENVIRONMENT = "production"

# Frontend Service
[[services]]
name = "frontend"
[services.ports]
port = 80
[services.health_checks]
grace_period = 30
interval = "15s"
timeout = "10s"
retries = 3
[services.env]
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"

# Backend Service  
[[services]]
name = "backend"
[services.ports]
port = 8000
[services.health_checks]
grace_period = 30
interval = "15s"
timeout = "10s"
retries = 3
path = "/health"
[services.env]
DATABASE_URL = "${{RAILWAY_ENVIRONMENT.DATABASE_URL}}"
GROQ_API_KEY = "${{RAILWAY_ENVIRONMENT.GROQ_API_KEY}}"
